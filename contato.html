<body>
      <header class="cabecalho">
        
        <div class="menu">
            <a href="./index.html"><img src="./img/ana linda no carro.jpeg" alt="Foto mais linda dela" class="lindadaminhavida"></a>

        <h1 class="titulos">Página dedicatória para Ana Livia Camilo Gamonar.</h1>
        <p> Descubra um pouco mais sobre a mulher que eu amo!</p>
        

    </header>
    <main class="tudao">
        <h2 class="subtitulos">Nos dê seu feedback!</h2>
        <form>
            <fieldset>
                <legend class="p">Informações de contato</legend>
                <label for="nome" class="p">Nome:</label>
                <input type="text" name="nome" id="nome" placeholder="Informe seu nome...">

                <label for="email" class="p">Email:</label>
                <input type="email" name="email" id="email" required placeholder="Digite seu email..."><br>

                <label for="comentario" class="p">Comentário:</label><br>
                <textarea name="comentario" id="comentario" placeholder="Digite o seu Comentário aqui..." cols="50" rows="10" class="p"></textarea><br>

                <button type="submit" class="p">Concluido</button>
            </fieldset>
            <button onclick="alert(`Feedback enviado!`)" class="buto">Enviar Feedback</button>
        </form>
    </main>
